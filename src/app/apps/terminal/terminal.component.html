<div class="terminal-container" (click)="focusInput()">
  <div class="terminal-body" #terminalBody>
    @for (line of history; track $index) {
      <div class="terminal-line" [class.command]="line.isCommand">
        @if (line.isHtml) {
          <div [innerHTML]="line.text"></div>
        } @else {
          {{ line.text }}
        }
      </div>
    }

    <div class="input-line">
      <span class="prompt">{{ prompt }}</span>
      <input
        #terminalInput
        type="text"
        [(ngModel)]="currentInput"
        (keyup.enter)="handleCommand()"
        autocomplete="off"
        spellcheck="false"
        autofocus>
    </div>
  </div>
</div>
